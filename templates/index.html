<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator | Minimalist & Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Kantumruy+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --khmer-font: 'Kantumruy Pro', sans-serif;
            --english-font: 'Inter', sans-serif;
        }
        body {
            background-color: #fcfcfd;
            color: #1a1a1e;
            font-family: var(--english-font);
            -webkit-font-smoothing: antialiased;
        }
        .lang-kh { font-family: var(--khmer-font); }
        
        .pro-card {
            background: #ffffff;
            border: 1px solid #f1f1f4;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.04);
            border-radius: 24px;
        }
        
        .qr-stage {
            background: #ffffff;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 20px 50px -15px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-field {
            background: #f8f9fb;
            border: 1.5px solid #eceef2;
            border-radius: 14px;
            padding: 12px 16px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
            color: #1a1a1e;
            width: 100%;
        }

        .input-field:focus {
            border-color: #6366f1;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.08);
        }

        .lang-toggle {
            background: #f1f3f7;
            padding: 4px;
            border-radius: 12px;
            display: flex;
            gap: 2px;
        }

        .lang-btn {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: #ffffff;
            color: #6366f1;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        input[type="color"] {
            appearance: none;
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch {
            border-radius: 8px;
            border: 1px solid #eceef2;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col lang-en">
    
    <!-- Top Navigation -->
    <nav class="w-full max-w-7xl mx-auto px-6 py-8 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <img src="https://i.imgur.com/ZiMQGDP.png" class="w-12 h-12 rounded-xl shadow-sm" alt="Logo">
            <div>
                <h1 class="text-xl font-bold tracking-tight text-slate-900" data-key="title">QR Generator</h1>
                <p class="text-[10px] uppercase tracking-widest font-extrabold text-slate-400" data-key="subtitle">Professional Studio</p>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <div class="lang-toggle">
                <button onclick="setLanguage('en')" id="btn-en" class="lang-btn active">EN</button>
                <button onclick="setLanguage('kh')" id="btn-kh" class="lang-btn">KH</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-7xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">
            
            <!-- Left Side: Configuration -->
            <div class="lg:col-span-7 space-y-8">
                
                <div class="pro-card p-8">
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-4 tracking-wider" data-key="label_content">Content to Encode</label>
                    <textarea id="qr-data" rows="3" class="input-field" placeholder="Paste URL or text here...">https://t.me/yunaonthetp</textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="pro-card p-8 space-y-6">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider" data-key="label_style">Appearance</label>
                        
                        <div class="space-y-4">
                            <div>
                                <span class="text-[11px] font-bold text-slate-500 mb-2 block" data-key="opt_dots">Dots Style</span>
                                <select id="dot-style" class="input-field text-sm">
                                    <option value="square">Square</option>
                                    <option value="dots">Dots</option>
                                    <option value="rounded" selected>Rounded</option>
                                    <option value="classy">Classy</option>
                                </select>
                            </div>
                            <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl">
                                <span class="text-xs font-semibold text-slate-600" data-key="fg_color">Accent Color</span>
                                <input type="color" id="fg-color" value="#4f46e5">
                            </div>
                        </div>
                    </div>

                    <div class="pro-card p-8 space-y-6">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider" data-key="label_corners">Geometry</label>
                        
                        <div class="space-y-4">
                            <div>
                                <span class="text-[11px] font-bold text-slate-500 mb-2 block" data-key="opt_corners">Corner Square</span>
                                <select id="corner-style" class="input-field text-sm">
                                    <option value="square">Square</option>
                                    <option value="dot">Dot</option>
                                    <option value="extra-rounded" selected>Soft Rounded</option>
                                </select>
                            </div>
                            <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl">
                                <span class="text-xs font-semibold text-slate-600" data-key="bg_color">Background</span>
                                <input type="color" id="bg-color" value="#ffffff">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-between p-4 px-6 pro-card">
                    <div class="flex items-center gap-4">
                        <img src="https://i.imgur.com/ZiMQGDP.png" onclick="toggleLogo()" class="w-10 h-10 rounded-lg cursor-pointer border border-slate-100 hover:scale-105 transition-transform" title="Toggle Logo">
                        <div>
                            <p class="text-[9px] font-black text-slate-400 uppercase" data-key="dev_credit">Developed by</p>
                            <a href="https://t.me/yunaonthetp" target="_blank" class="text-sm font-bold text-indigo-600 hover:underline">@yunaonthetp</a>
                        </div>
                    </div>
                    <div class="text-[10px] font-medium text-slate-300">v2.4 Pro Human</div>
                </div>
            </div>

            <!-- Right Side: Preview -->
            <div class="lg:col-span-5">
                <div class="sticky top-10 flex flex-col items-center">
                    <div class="qr-stage mb-10" id="canvas-container"></div>
                    
                    <div class="w-full max-w-sm space-y-4">
                        <button id="download-png" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-xl shadow-indigo-200 transition-all transform active:scale-[0.98]">
                            <span data-key="btn_png">Export Image (PNG)</span>
                        </button>
                        <button id="download-svg" class="w-full py-3 text-slate-400 font-semibold hover:text-slate-600 transition-all text-sm">
                            <span data-key="btn_svg">Export Vector (SVG)</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Success Feedback -->
    <div id="toast" class="fixed bottom-10 right-10 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-4 transition-all duration-300 pointer-events-none text-sm font-medium">
        File saved successfully.
    </div>

    <script>
        let qrCode;
        let logoEnabled = false;

        const translations = {
            en: {
                title: "QR Generator",
                subtitle: "Professional Studio",
                label_content: "Content to Encode",
                label_style: "Appearance",
                label_corners: "Geometry",
                opt_dots: "Dots Style",
                opt_corners: "Corner Square",
                fg_color: "Accent Color",
                bg_color: "Background",
                btn_png: "Export Image (PNG)",
                btn_svg: "Export Vector (SVG)",
                dev_credit: "Developed by",
                toast: "File saved successfully."
            },
            kh: {
                title: "កម្មវិធីបង្កើត QR",
                subtitle: "ស្ទូឌីយ៉ូអាជីព",
                label_content: "មាតិកាកូដ",
                label_style: "រូបរាងខាងក្រៅ",
                label_corners: "ធរណីមាត្រ",
                opt_dots: "រចនាប័ទ្មចំណុច",
                opt_corners: "រចនាប័ទ្មជ្រុង",
                fg_color: "ពណ៌កូដ",
                bg_color: "ពណ៌ផ្ទៃក្រោយ",
                btn_png: "ទាញយកជារូបភាព (PNG)",
                btn_svg: "ទាញយកជាវ៉ិចទ័រ (SVG)",
                dev_credit: "បង្កើតឡើងដោយ",
                toast: "រក្សាទុកដោយជោគជ័យ"
            }
        };

        function setLanguage(lang) {
            document.body.className = `min-h-screen flex flex-col lang-${lang}`;
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (translations[lang][key]) el.textContent = translations[lang][key];
            });
            
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.getElementById('btn-kh').classList.toggle('active', lang === 'kh');
            localStorage.setItem('qr_lang', lang);
        }

        function toggleLogo() {
            logoEnabled = !logoEnabled;
            updateQR();
        }

        function initQR() {
            qrCode = new QRCodeStyling({
                width: 280, height: 280,
                data: document.getElementById('qr-data').value,
                image: logoEnabled ? "https://i.imgur.com/ZiMQGDP.png" : "",
                dotsOptions: { color: "#4f46e5", type: "rounded" },
                backgroundOptions: { color: "#ffffff" },
                cornersSquareOptions: { type: "extra-rounded" },
                imageOptions: { crossOrigin: "anonymous", margin: 10 }
            });
            qrCode.append(document.getElementById('canvas-container'));
        }

        function updateQR() {
            qrCode.update({
                data: document.getElementById('qr-data').value,
                image: logoEnabled ? "https://i.imgur.com/ZiMQGDP.png" : "",
                dotsOptions: { 
                    color: document.getElementById('fg-color').value,
                    type: document.getElementById('dot-style').value 
                },
                backgroundOptions: { color: document.getElementById('bg-color').value },
                cornersSquareOptions: { 
                    color: document.getElementById('fg-color').value,
                    type: document.getElementById('corner-style').value 
                }
            });
        }

        function showToast() {
            const currentLang = localStorage.getItem('qr_lang') || 'en';
            const toast = document.getElementById('toast');
            toast.textContent = translations[currentLang].toast;
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }

        // Listeners
        ['qr-data', 'fg-color', 'bg-color', 'dot-style', 'corner-style'].forEach(id => {
            document.getElementById(id).addEventListener('input', updateQR);
        });

        document.getElementById('download-png').addEventListener('click', () => {
            qrCode.download({ name: "qr-generator-export", extension: "png" });
            showToast();
        });

        document.getElementById('download-svg').addEventListener('click', () => {
            qrCode.download({ name: "qr-generator-vector", extension: "svg" });
            showToast();
        });

        window.onload = () => {
            initQR();
            setLanguage(localStorage.getItem('qr_lang') || 'en');
        };
    </script>
</body>
</html>
